# Az alkalmazas HTTP szervere a 8080-as porton indul.
server.port=8080

# Alapertelemezett profil: ha nincs kulon megadva profil, a helyi (local) konfiguracio toltodik be.
spring.profiles.default=local

# Kikapcsolja az Open Session in View mintat, hogy a perzisztencia reteg ne maradjon nyitva a webes valaszig.
spring.jpa.open-in-view=false

# Liquibase migraciok futtatasa letiltva ennel a kornyezetnel.
spring.liquibase.enabled=false
# A Liquibase auto-konfiguracio teljes kizarasa, hogy Spring ne inicializalja automatikusan.
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.liquibase.LiquibaseAutoConfiguration

# JWT alairokulcs: kotelezoen a JWT_SECRET kornyezeti valtozobol jon.
# Ha a JWT_SECRET nincs beallitva, az alkalmazas indulaskor hibaval leall, igy nem tud gyenge default kulccsal futni.
app.jwt.secret=${JWT_SECRET}
# JWT lejarati ido ezredmasodpercben (86400000 ms = 24 ora).
app.jwt.expiration=86400000

# Admin bootstrap: alapbol kikapcsolt, hogy ne legyen automatikus admin seed beégetett jelszóval.
app.bootstrap.admin.enabled=false
# Ha a bootstrap be van kapcsolva, az email es jelszo ertekeket kulso configbol (env/secrets fajl) kell megadni.
app.bootstrap.admin.email=${ADMIN_BOOTSTRAP_EMAIL:}
app.bootstrap.admin.password=${ADMIN_BOOTSTRAP_PASSWORD:}

# Login brute-force vedelem: ennyi probalkozas engedelyezett egy idoszakon belul kulcsonkent (email+IP).
app.auth.login-rate-limit.max-attempts=5
# Sikertelen login probalkozasok szamlalasi ablaka masodpercben.
app.auth.login-rate-limit.window-seconds=300
# Blokkolasi ido masodpercben, ha a max probalkozasi limit elerese miatt tiltunk.
app.auth.login-rate-limit.block-seconds=300

# Alap naplozasi szint az egesz alkalmazasra.
logging.level.root=INFO
# A sajat backend csomag reszletesebb (DEBUG) naplozasa hibakereseshez.
logging.level.com.royalcruise.backend=DEBUG
