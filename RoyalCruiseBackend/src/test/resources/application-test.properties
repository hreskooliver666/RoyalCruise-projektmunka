# A tesztprofil Docker nelkul is futhato H2 in-memory adatbazist hasznal,
# igy IntelliJ-bol helyben is stabilan futnak a tesztek Testcontainers nelkul.
spring.datasource.url=jdbc:h2:mem:royalcruise_test;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect
spring.sql.init.mode=never

app.jwt.secret=my-test-secret-key-that-is-long-enough-for-256-bits
app.jwt.expiration=3600000

