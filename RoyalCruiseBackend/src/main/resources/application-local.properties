# Helyi gepen futo adatbazis elerese; host/port/nev felulirhato kornyezeti valtozokkal.
spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:royalcruise}
# Opcionális kulso konfiguracio betoltese a backend gyokerkonyvtarabol.
# Itt lehet helyben, fajlbol megadni az erzekeny valtozokat (pl. JWT_SECRET) shell env nelkul.
spring.config.import=optional:file:./secrets-local.properties
# JDBC driver beallitasa PostgreSQL adatbazishoz.
spring.datasource.driverClassName=org.postgresql.Driver


# Helyi profil felhasznaloneve: ha DB_USER nincs megadva, a postgres lesz hasznalva.
spring.datasource.username=${DB_USER:}
# Helyi jelszo: ha DB_PASSWORD nincs beallitva, a megadott fallback erteket hasznalja.
spring.datasource.password=${DB_PASSWORD:}
# Helyi futasban itt is adunk JWT_SECRET fallbacket, hogy env valtozo nelkul is el tudjon indulni az alkalmazas.
app.jwt.secret=${JWT_SECRET:}


# A lokalis fejleszteshez a Hibernate modosithatja a semat az entitasok alapjan.
spring.jpa.hibernate.ddl-auto=update